<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일유업 AI 크리에이티브 에이전트</title>
<style>
  :root {
    --maeil-blue: #00448B;
    --maeil-blue-hover: #003670;
    --maeil-blue-light: #E8EEF6;
    --maeil-blue-soft: #F5F8FC;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #86868b;
    --border: #d2d2d7;
    --border-light: #e8e8ed;
    --bg: #ffffff;
    --bg-secondary: #fbfbfd;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                 "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", Helvetica, Arial, sans-serif;
    font-size: 17px; line-height: 1.47; letter-spacing: -0.022em;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 56px 22px 80px; }
  header { text-align: center; margin-bottom: 56px; }
  .logo { height: 44px; width: auto; display: inline-block; margin-bottom: 28px; }
  h1 { font-size: 40px; line-height: 1.1; letter-spacing: -0.01em; font-weight: 600; color: var(--text-primary); margin: 0 0 10px; }
  .subtitle { font-size: 19px; color: var(--text-secondary); margin: 0; font-weight: 400; }
  .card { background: var(--bg); border: 1px solid var(--border-light); border-radius: 18px; padding: 22px 24px; margin-bottom: 14px; transition: border-color 0.2s; }
  .card:focus-within { border-color: var(--maeil-blue); }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-primary); letter-spacing: -0.01em; }
  input[type="text"] {
    width: 100%; padding: 12px 14px; font-size: 16px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-primary); outline: none;
    font-family: inherit; transition: border-color 0.15s, background 0.15s;
  }
  input[type="text"]:focus { border-color: var(--maeil-blue); background: var(--bg); }
  .input-row { display: flex; gap: 10px; }
  .input-row input { flex: 1; }
  button {
    background: var(--maeil-blue); color: white; border: none;
    border-radius: 980px; padding: 12px 22px; font-size: 15px;
    font-weight: 500; cursor: pointer; white-space: nowrap;
    font-family: inherit; letter-spacing: -0.01em;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: var(--maeil-blue-hover); }
  button:active { transform: scale(0.97); }
  button:disabled { background: var(--border); color: var(--text-tertiary); cursor: not-allowed; transform: none; }
  h2 { font-size: 28px; line-height: 1.14; letter-spacing: 0.004em; font-weight: 600; margin: 48px 0 8px; color: var(--text-primary); }
  .hint { font-size: 15px; color: var(--text-secondary); margin: 0 0 20px; letter-spacing: -0.01em; }
  #status { font-size: 14px; color: var(--maeil-blue); margin: 20px 0; min-height: 22px; letter-spacing: -0.01em; text-align: center; }
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid var(--maeil-blue); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 10px; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .idea-card {
    background: var(--bg); border: 1px solid var(--border-light);
    border-radius: 18px; padding: 22px 24px; margin-bottom: 12px;
    cursor: pointer;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.45s ease, transform 0.45s ease, border-color 0.2s, box-shadow 0.2s;
  }
  .idea-card.visible { opacity: 1; transform: translateY(0); }
  .idea-card:hover { border-color: var(--maeil-blue); box-shadow: 0 4px 16px rgba(0,68,139,0.08); }
  .idea-card.selected { border-color: var(--maeil-blue); background: var(--maeil-blue-soft); box-shadow: 0 4px 16px rgba(0,68,139,0.1); }
  .idea-title { font-weight: 600; font-size: 19px; margin-bottom: 6px; color: var(--text-primary); letter-spacing: -0.01em; }
  .idea-concept { font-size: 15px; color: var(--maeil-blue); margin-bottom: 10px; font-weight: 500; letter-spacing: -0.01em; }
  .idea-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.52; letter-spacing: -0.01em; min-height: 1em; }
  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--maeil-blue); vertical-align: text-bottom; animation: blink 0.7s steps(1) infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  #videoStatus {
    display: none; text-align: center; padding: 36px 24px;
    background: var(--bg-secondary); border: 1px solid var(--border-light);
    border-radius: 18px; margin-top: 28px;
  }
  .video-loading-icon { font-size: 32px; margin-bottom: 4px; }
  .video-loading-label { font-size: 14px; color: var(--maeil-blue); margin-top: 16px; letter-spacing: -0.01em; }
  .video-loading-bar-wrap { width: 100%; max-width: 320px; height: 4px; background: var(--border-light); border-radius: 2px; margin: 14px auto 0; overflow: hidden; }
  .video-loading-bar { height: 100%; background: var(--maeil-blue); border-radius: 2px; width: 0%; transition: width 0.5s ease; }
  #videoSection {
    display: none; margin-top: 28px;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #videoSection.visible { opacity: 1; transform: translateY(0); }
  .video-wrap { background: #000; border-radius: 18px; overflow: hidden; border: 1px solid var(--border-light); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  #videoPlayer { width: 100%; display: block; max-height: 420px; background: #000; }
  .video-label { font-size: 13px; color: var(--text-tertiary); margin-top: 12px; text-align: center; letter-spacing: -0.01em; }
  @media (max-width: 520px) {
    .wrap { padding: 36px 18px 60px; }
    h1 { font-size: 32px; }
    .subtitle { font-size: 17px; }
    .input-row { flex-direction: column; }
    .input-row button { width: 100%; }
    h2 { font-size: 24px; }
    .logo { height: 38px; }
  }
</style>
</head>

    description: "순백의 미니멀 스튜디오에서 한 현대 아티스트가 매일 그릭요거트를 유일한 미술 매체로 사용해 빈 캔버스 위에 단 하나의 완벽한 곡선을 그리는 15초 단일 테이크 광고. 팔레트 대신 요거트 그릇, 붓 대신 은 숟가락. 호흡을 가다듬고 숟가락에 요거트를 떠 한 번의 일필휘지로 캔버스 위에 캘리그래피적 곡선을 그리면, 밀도 높은 요거트가 흘러내리지 않고 입체적 융기로 자리잡으며 빛과 그림자로만 만들어지는 회화가 완성됩니다. 마지막에 여성 큐레이터 톤의 나레이션이 흐릅니다: \"비로소, 그 자체로 완성됩니다.\" 비주얼 톤: 화이트 큐브 갤러리 미학, 북향 자연광, 35mm 아나모픽. 색감은 순백 + 쿨 크림 + 페일 그레이 모노크롬.",
    videoSrc: "video3.mp4"
  }
];


const generateBtn = document.getElementById("generateBtn");
const statusEl    = document.getElementById("status");
const ideasSection  = document.getElementById("ideasSection");
const ideasContainer = document.getElementById("ideasContainer");
const videoStatus   = document.getElementById("videoStatus");
const videoStatusText = document.getElementById("videoStatusText");
const videoLoadingBar = document.getElementById("videoLoadingBar");
const videoSection  = document.getElementById("videoSection");
const videoPlayer   = document.getElementById("videoPlayer");
const videoLabel    = document.getElementById("videoLabel");

function setStatus(msg, loading) {
  statusEl.innerHTML = loading
    ? "<span class=\"spinner\"></span>" + msg
    : msg;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function typeText(el, text, speed) {
  el.innerHTML = "<span class=\"cursor\"></span>";
  var i = 0;
  var cursor = el.querySelector(".cursor");
  var iv = setInterval(function() {
    if (i < text.length) {
      cursor.insertAdjacentText("beforebegin", text[i]);
      i++;
    } else {
      clearInterval(iv);
      cursor.remove();
    }
  }, speed);
}

function renderIdeas() {
  ideasContainer.innerHTML = "";
  IDEAS.forEach(function(idea, idx) {
    var card = document.createElement("div");
    card.className = "idea-card";
    card.innerHTML =
      "<div class=\"idea-title\">" + escapeHtml(idea.title) + "</div>" +
      "<div class=\"idea-concept\">" + escapeHtml(idea.concept) + "</div>" +
      "<div class=\"idea-desc\" id=\"desc-" + idx + "\"></div>";
    card.addEventListener("click", function() { onIdeaClick(idea, card); });
    ideasContainer.appendChild(card);

    (function(i, c, desc) {
      setTimeout(function() {
        c.classList.add("visible");
        setTimeout(function() {
          typeText(document.getElementById("desc-" + i), desc, 12);
        }, 300);
      }, i * 500);
    })(idx, card, idea.description);
  });
  ideasSection.style.display = "block";
}

function onIdeaClick(idea, card) {
  document.querySelectorAll(".idea-card").forEach(function(c) { c.classList.remove("selected"); });
  card.classList.add("selected");

  videoSection.style.display = "none";
  videoSection.classList.remove("visible");
  videoPlayer.pause();
  videoPlayer.src = "";

  videoStatus.style.display = "block";
  videoStatusText.innerHTML = "<span class=\"spinner\"></span>영상을 생성하는 중입니다...";
  videoLoadingBar.style.width = "0%";

  var targets = [30, 55, 75, 90, 98];
  var delays  = [400, 900, 1500, 2100, 2700];
  targets.forEach(function(t, i) {
    setTimeout(function() { videoLoadingBar.style.width = t + "%"; }, delays[i]);
  });

  setTimeout(function() {
    videoStatusText.innerHTML = "<span class=\"spinner\"></span>프레임을 렌더링하는 중입니다...";
  }, 1000);
  setTimeout(function() {
    videoStatusText.innerHTML = "<span class=\"spinner\"></span>영상을 마무리하는 중입니다...";
  }, 2200);

  setTimeout(function() {
    videoLoadingBar.style.width = "100%";
    setTimeout(function() {
      videoStatus.style.display = "none";
      videoLoadingBar.style.width = "0%";

      videoPlayer.src = idea.videoSrc;
      videoLabel.textContent = idea.title.replace(/"/g, "");
      videoSection.style.display = "block";

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          videoSection.classList.add("visible");
        });
      });

      videoPlayer.play().catch(function() {});
      videoSection.scrollIntoView({ behavior: "smooth", block: "start" });
      setStatus("영상 생성이 완료되었습니다.");
    }, 300);
  }, 3200);
}

generateBtn.addEventListener("click", function() {
  var product = document.getElementById("product").value.trim();
  if (!product) {
    statusEl.textContent = "제품명을 입력해주세요.";
    return;
  }
  generateBtn.disabled = true;
  ideasSection.style.display = "none";
  videoStatus.style.display = "none";
  videoSection.style.display = "none";
  videoSection.classList.remove("visible");
  ideasContainer.innerHTML = "";

  setStatus("웹에서 제품 정보를 조사하고 광고 시안을 생성하는 중...", true);
  setTimeout(function() { setStatus("크리에이티브 컨셉을 구성하는 중...", true); }, 1000);
  setTimeout(function() { setStatus("시안 3개를 완성하는 중...", true); }, 2000);
  setTimeout(function() {
    generateBtn.disabled = false;
    setStatus("3개의 시안이 생성되었습니다. 하나를 선택하세요.");
    renderIdeas();
  }, 2700);
});
</script>
</body>
</html>
