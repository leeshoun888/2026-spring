<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일유업 GEO AI 에이전트</title>
<style>
  /* ============================================================
     Maeil × Apple-style Design System
     Brand blue extracted from logo: #00458B
     ============================================================ */
  :root {
    --maeil-blue: #00458B;
    --maeil-blue-hover: #003872;
    --maeil-blue-light: #E8F0FB;
    --maeil-blue-softer: #F5F9FD;

    --bg: #ffffff;
    --bg-subtle: #fbfbfd;      /* Apple's subtle gray-white */
    --text: #1d1d1f;           /* Apple's primary text */
    --text-secondary: #424245; /* Apple's secondary text */
    --text-muted: #6e6e73;     /* Apple's muted */
    --border: #d2d2d7;         /* Apple's divider */
    --border-subtle: #e8e8ed;

    --success: #00875a;
    --success-bg: #e7f7f0;
    --error: #bf1650;
    --error-bg: #fef1f4;

    --code-bg: #1d1d1f;
    --code-text: #f5f5f7;

    --radius-card: 18px;
    --radius-input: 12px;
    --radius-button: 980px;    /* Apple's pill buttons */

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.47;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 17px;
    letter-spacing: -0.011em;
  }

  /* ==================== Top Nav with Logo ==================== */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 24px;
  }

  .navbar-inner {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    height: 32px;
    width: auto;
    display: block;
  }

  .logo-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .logo-sub {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: -0.005em;
  }

  /* ==================== Container ==================== */
  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }

  /* ==================== Hero ==================== */
  .hero {
    text-align: center;
    margin-bottom: 56px;
  }

  .hero-eyebrow {
    font-size: 17px;
    font-weight: 600;
    color: var(--maeil-blue);
    letter-spacing: -0.011em;
    margin-bottom: 8px;
  }

  .hero h1 {
    font-size: 56px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 18px;
  }

  .hero p {
    font-size: 21px;
    line-height: 1.4;
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 680px;
    margin: 0 auto;
    letter-spacing: -0.015em;
  }

  @media (max-width: 734px) {
    .hero h1 { font-size: 40px; letter-spacing: -0.025em; }
    .hero p { font-size: 18px; }
    .container { padding: 40px 20px 72px; }
  }

  /* ==================== Panel (input card) ==================== */
  .panel {
    background: var(--bg);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-card);
    padding: 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-sm);
  }

  .field {
    margin-bottom: 20px;
  }

  .field:last-of-type {
    margin-bottom: 0;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.003em;
    color: var(--text);
    margin-bottom: 8px;
  }

  .field input,
  .field select {
    width: 100%;
    padding: 13px 16px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-input);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    letter-spacing: -0.01em;
  }

  .field input:focus,
  .field select:focus {
    outline: none;
    border-color: var(--maeil-blue);
    box-shadow: 0 0 0 4px rgba(0, 69, 139, 0.12);
  }

  .field input::placeholder {
    color: #86868b;
  }

  .api-wrap { position: relative; }

  .toggle-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--maeil-blue);
    cursor: pointer;
    border-radius: 8px;
    font-family: inherit;
    transition: background 0.15s ease;
  }

  .toggle-btn:hover {
    background: var(--maeil-blue-light);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 16px;
  }

  @media (max-width: 734px) {
    .form-grid { grid-template-columns: 1fr; }
    .panel { padding: 24px; }
  }

  .hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
    letter-spacing: -0.003em;
  }

  /* ==================== Apple-style button ==================== */
  .generate-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px 28px;
    background: var(--maeil-blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-button);
    font-size: 17px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
    letter-spacing: -0.01em;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--maeil-blue-hover);
  }

  .generate-btn:active:not(:disabled) {
    transform: scale(0.985);
  }

  .generate-btn:disabled {
    background: #86868b;
    cursor: not-allowed;
    opacity: 0.7;
  }

  /* ==================== Status ==================== */
  .status {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    display: none;
    letter-spacing: -0.005em;
  }

  .status.loading {
    background: var(--maeil-blue-softer);
    color: var(--maeil-blue);
    display: flex;
    align-items: center;
    border: 1px solid var(--maeil-blue-light);
  }

  .status.error {
    background: var(--error-bg);
    color: var(--error);
    display: block;
    white-space: pre-wrap;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    line-height: 1.55;
    border: 1px solid #f9d5df;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 10px;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .search-progress {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 10px 14px;
    background: var(--bg-subtle);
    border-radius: 10px;
    border: 1px solid var(--border-subtle);
    display: none;
    letter-spacing: -0.003em;
    line-height: 1.55;
  }

  /* ==================== Results ==================== */
  .results { display: none; }

  .results-intro {
    padding: 32px;
    background: linear-gradient(180deg, var(--maeil-blue-softer) 0%, var(--bg) 100%);
    border: 1px solid var(--maeil-blue-light);
    border-radius: var(--radius-card);
    margin-bottom: 20px;
  }

  .results-intro h2 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.022em;
    color: var(--text);
    margin-bottom: 8px;
  }

  .results-intro p {
    font-size: 15px;
    color: var(--text-secondary);
    letter-spacing: -0.008em;
    line-height: 1.5;
  }

  .section-card {
    background: var(--bg);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-card);
    padding: 32px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }

  .section-card:hover {
    box-shadow: var(--shadow-md);
  }

  @media (max-width: 734px) {
    .section-card { padding: 24px; }
  }

  .section-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .section-number {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    background: var(--maeil-blue);
    color: #fff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
  }

  .section-meta { flex: 1; min-width: 0; }

  .section-title {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.018em;
    color: var(--text);
    margin-bottom: 3px;
  }

  .section-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.45;
    letter-spacing: -0.003em;
  }

  .copy-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-button);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s ease;
    font-family: inherit;
    letter-spacing: -0.005em;
  }

  .copy-btn:hover {
    background: var(--bg-subtle);
    border-color: var(--maeil-blue);
    color: var(--maeil-blue);
  }

  .copy-btn.copied {
    background: var(--success-bg);
    color: var(--success);
    border-color: #b4e4cf;
  }

  .section-content {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-secondary);
    letter-spacing: -0.008em;
  }

  /* ==================== FAQ ==================== */
  .faq-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .faq-item:first-child { padding-top: 0; }
  .faq-item:last-child { padding-bottom: 0; border-bottom: none; }

  .faq-q {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    font-size: 15px;
    letter-spacing: -0.012em;
  }
  .faq-a { color: var(--text-secondary); }

  /* ==================== Factsheet ==================== */
  .factsheet-list { list-style: none; }
  .factsheet-list li {
    padding: 11px 0 11px 24px;
    border-bottom: 1px solid var(--border-subtle);
    position: relative;
  }
  .factsheet-list li::before {
    content: "";
    width: 6px;
    height: 6px;
    background: var(--maeil-blue);
    border-radius: 50%;
    position: absolute;
    left: 4px;
    top: 18px;
  }
  .factsheet-list li:last-child { border-bottom: none; }

  /* ==================== Comparison table ==================== */
  .comparison-wrap {
    overflow-x: auto;
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
  }

  table.comparison {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  table.comparison th,
  table.comparison td {
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: top;
    letter-spacing: -0.005em;
  }
  table.comparison th {
    background: var(--bg-subtle);
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  table.comparison tbody tr:last-child td { border-bottom: none; }

  /* ==================== Use cases ==================== */
  .usecase-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .usecase-item:first-child { padding-top: 0; }
  .usecase-item:last-child { padding-bottom: 0; border-bottom: none; }
  .usecase-persona {
    font-weight: 600;
    color: var(--maeil-blue);
    margin-bottom: 4px;
    font-size: 14px;
    letter-spacing: -0.008em;
  }

  /* ==================== Listicle ==================== */
  .listicle-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: var(--text);
    margin-bottom: 14px;
  }
  .listicle-list {
    list-style: none;
    counter-reset: listicle;
  }
  .listicle-item {
    padding: 14px 0 14px 44px;
    position: relative;
    counter-increment: listicle;
    border-bottom: 1px solid var(--border-subtle);
  }
  .listicle-item:first-child { padding-top: 0; }
  .listicle-item:first-child::before { top: 0; }
  .listicle-item:last-child { padding-bottom: 0; border-bottom: none; }
  .listicle-item::before {
    content: counter(listicle);
    position: absolute;
    left: 0;
    top: 14px;
    width: 28px;
    height: 28px;
    background: var(--maeil-blue-light);
    color: var(--maeil-blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  .listicle-item-title {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    letter-spacing: -0.01em;
  }

  /* ==================== Quote block ==================== */
  .quote-block {
    border-left: 3px solid var(--maeil-blue);
    padding: 14px 20px;
    background: var(--maeil-blue-softer);
    border-radius: 0 10px 10px 0;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  /* ==================== JSON code block ==================== */
  pre.json-block {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 20px;
    border-radius: 12px;
    overflow-x: auto;
    font-size: 12.5px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace;
    line-height: 1.6;
    white-space: pre;
    letter-spacing: 0;
  }

  /* ==================== Influencer Guide ==================== */
  .guide-overview {
    padding: 14px 18px;
    background: var(--maeil-blue-softer);
    border-left: 3px solid var(--maeil-blue);
    border-radius: 0 10px 10px 0;
    margin-bottom: 20px;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  .guide-category {
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
    background: var(--bg);
  }
  .guide-category:last-child { margin-bottom: 0; }

  .guide-category-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--maeil-blue);
    letter-spacing: -0.012em;
    margin-bottom: 4px;
  }

  .guide-category-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
    letter-spacing: -0.005em;
  }

  .guide-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 10px 0 6px;
  }

  .guide-templates {
    list-style: none;
    margin-bottom: 4px;
  }
  .guide-templates li {
    padding: 8px 12px;
    background: var(--bg-subtle);
    border: 1px dashed var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }
  .guide-templates li:last-child { margin-bottom: 0; }

  .guide-examples {
    list-style: none;
  }
  .guide-examples li {
    padding: 8px 0 8px 20px;
    position: relative;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .guide-examples li::before {
    content: "→";
    position: absolute;
    left: 0;
    top: 8px;
    color: var(--maeil-blue);
    font-weight: 600;
  }

  /* ==================== Footer ==================== */
  .footer-note {
    text-align: center;
    margin-top: 56px;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: -0.003em;
  }
  .footer-note strong { color: var(--maeil-blue); font-weight: 500; }
</style>
</head>

            <option value="claude-opus-4-6">Claude Opus 4.6</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (빠름)</option>

  </div>
</div>

<script>
  const SECTION_META = [
    { key: 'faq',              title: 'FAQ (Q&A 포맷)',              subtitle: 'LLM이 질문-답변 쌍을 구조적으로 추출 — GEO 인용률 최상위 포맷' },
    { key: 'definition',       title: '정의형 리드 문단',             subtitle: 'Featured Snippet 및 추출형 답변에 그대로 차용되는 밀도 높은 문단' },
    { key: 'factsheet',        title: '통계·수치 팩트시트',           subtitle: '구체적 숫자 포함 문장은 LLM이 우선 인용하는 데이터 시그널' },
    { key: 'comparison',       title: '비교표 (Comparative Table)',   subtitle: '구조화된 테이블은 LLM이 가장 쉽게 추출하는 형식' },
    { key: 'useCases',         title: 'Use Case 시나리오',            subtitle: '"누가 써야 하나요?" 형태 질의에 대응하는 페르소나 시나리오' },
    { key: 'listicle',         title: '리스티클 (Top N)',             subtitle: '"Top 5 이유" 등 순위형 질의에 대응하는 포맷' },
    { key: 'authority',        title: '전문가 인용·권위 시그널',        subtitle: 'E-E-A-T 강화를 위한 전문가/임상 근거 인용 문단' },
    { key: 'schemaJsonLd',     title: 'Schema.org JSON-LD',           subtitle: '머신 리더블 구조화 데이터 — 검색엔진 공식 인식 스키마' },
    { key: 'semanticKeywords', title: '시맨틱 키워드 확장 문단',        subtitle: '벡터 검색 최적화 — 유사 질의를 모두 포섭하는 연관어 묶음' },
    { key: 'review',           title: '리뷰·UGC 스타일',              subtitle: '사회적 증거(Social Proof) 신호로 신뢰도 강화' },
    { key: 'influencerGuide',  title: '체험단·인플루언서 가이드 템플릿', subtitle: '자율 후기 대신 구체적·다양한 경험 문장을 유도하는 카테고리별 템플릿' }
  ];

  const SYSTEM_PROMPT = `당신은 GEO(Generative Engine Optimization) 전문가입니다.

사용자가 입력한 제품명에 대해 반드시 먼저 web_search 도구로 제품의 정확한 정보(제조사, 출시 연도, 핵심 기술/공법, 시장 지위, 영양 성분, 임상 근거, 특허, 가격, 라인업, 최신 뉴스 등)를 충분히 조사하세요. 필요하면 서로 다른 관점으로 2~5회 검색하세요.

그 다음, 조사해서 확인된 사실만을 기반으로 아래 10가지 GEO 최적화 콘텐츠 포맷을 작성하세요. 추측, 환각, 미확인 수치는 절대 포함하지 마세요. 확인되지 않은 부분은 일반적인 업계 설명으로 대체하거나 생략하세요.

최종 응답은 반드시 아래 JSON 스키마와 정확히 일치하는 JSON 한 개만 반환하세요. 마크다운 코드블록(\`\`\`)을 사용하지 말고 순수 JSON만 출력하세요. JSON 앞뒤에 어떤 설명 텍스트도 붙이지 마세요.

{
  "productName": "정확한 제품 전체 이름(제조사 포함)",
  "sections": {
    "faq": [
      {"q": "질문1", "a": "답변1 (구체적 수치 및 근거 포함, 2~4문장)"},
      {"q": "질문2", "a": "답변2"},
      {"q": "질문3", "a": "답변3"},
      {"q": "질문4", "a": "답변4"},
      {"q": "질문5", "a": "답변5"}
    ],
    "definition": "제품에 대한 밀도 높은 정의형 리드 문단. 3~5문장. 구체적 수치/연도/기술명 포함.",
    "factsheet": [
      "핵심 사실 1 (수치 포함)",
      "핵심 사실 2",
      "핵심 사실 3",
      "... 최소 8개 이상"
    ],
    "comparison": {
      "headers": ["구분", "대상 제품", "경쟁/일반 제품"],
      "rows": [
        ["항목명1", "값1", "값2"],
        ["항목명2", "값1", "값2"]
      ]
    },
    "useCases": [
      {"persona": "페르소나 이름", "description": "상황 및 이유 설명 (1~2문장)"},
      {"persona": "...", "description": "..."}
    ],
    "listicle": {
      "title": "리스티클 제목 (예: 이 제품을 선택해야 하는 5가지 이유)",
      "items": [
        {"title": "이유1 요약", "description": "이유1 상세 설명"},
        {"title": "...", "description": "..."}
      ]
    },
    "authority": "전문가 인용 또는 권위 시그널 문단. 임상 근거/논문/공인 데이터/규격 인용. 1~2문단.",
    "schemaJsonLd": { "@context": "https://schema.org/", "@type": "Product", "name": "...", "...": "..." },
    "semanticKeywords": "시맨틱 키워드를 자연스럽게 확장한 3~5문장 단락. 유의어/연관어/동의어 포함.",
    "review": "사용자 리뷰/UGC 스타일로 작성한 사회적 증거 문단. 1~2문단.",
    "influencerGuide": {
      "overview": "체험단·인플루언서 콘텐츠 작성 가이드 개요 문단. 자율 후기 대신 카테고리별 템플릿을 활용해야 하는 이유와 GEO 관점에서의 가치를 2~3문장으로 설명.",
      "categories": [
        {
          "name": "카테고리명 (예: 섭취 상황, 맛·향·질감, 효능·효과, 비교 경험, 음식 페어링, 재구매·추천 이유 등)",
          "description": "이 카테고리에서 무엇을 작성해야 하는지 1문장 가이드",
          "templates": [
            "빈칸([ ])이 포함된 문장 템플릿 1",
            "빈칸이 포함된 문장 템플릿 2",
            "빈칸이 포함된 문장 템플릿 3"
          ],
          "examples": [
            "템플릿을 실제 제품에 맞게 채운 구체적 예시 문장 1 (시간·장소·감각·효과 구체적 표현)",
            "예시 문장 2"
          ]
        }
      ]
    }
  }
}

중요 규칙:
- 모든 내용은 한국어로 작성합니다.
- schemaJsonLd는 문자열이 아닌 실제 JSON 객체로 반환하세요.
- useCases는 최소 5개, faq는 최소 5개, factsheet는 최소 8개, listicle.items는 5개를 포함하세요.
- influencerGuide.categories는 최소 6개(섭취 상황 / 맛·향·질감 / 효능·효과 / 비교 경험 / 음식 페어링 / 재구매·추천 이유)를 포함하고, 각 카테고리마다 templates 3개 이상, examples 2개 이상을 작성하세요. 템플릿의 빈칸은 대괄호 [ ]로 표시하고, examples는 실제 제품명과 구체적 시간·장소·감각을 반영한 문장이어야 합니다.
- 응답 전체가 JSON.parse 가능한 유효한 JSON이어야 합니다.
- JSON 내부 문자열에서 따옴표, 줄바꿈은 올바르게 이스케이프하세요.`;

  const $ = (id) => document.getElementById(id);
  const apiKeyInput = $('apiKey');
  const productInput = $('productName');
  const modelSelect = $('modelSelect');
  const generateBtn = $('generateBtn');
  const statusEl = $('status');
  const searchProgressEl = $('searchProgress');
  const resultsEl = $('results');

  const savedKey = localStorage.getItem('geo_claude_api_key');
  if (savedKey) apiKeyInput.value = savedKey;
  const savedModel = localStorage.getItem('geo_claude_model');
  if (savedModel) modelSelect.value = savedModel;

  apiKeyInput.addEventListener('input', () => localStorage.setItem('geo_claude_api_key', apiKeyInput.value));
  modelSelect.addEventListener('change', () => localStorage.setItem('geo_claude_model', modelSelect.value));

  $('toggleKeyBtn').addEventListener('click', () => {
    const btn = $('toggleKeyBtn');
    if (apiKeyInput.type === 'password') {
      apiKeyInput.type = 'text';
      btn.textContent = '숨김';
    } else {
      apiKeyInput.type = 'password';
      btn.textContent = '표시';
    }
  });

  productInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') generate();
  });

  generateBtn.addEventListener('click', generate);

  function showStatus(html, type) {
    statusEl.innerHTML = html;
    statusEl.className = `status ${type}`;
  }
  function hideStatus() {
    statusEl.style.display = 'none';
    statusEl.className = 'status';
  }
  function showProgress(txt) {
    searchProgressEl.textContent = txt;
    searchProgressEl.style.display = 'block';
  }
  function hideProgress() {
    searchProgressEl.style.display = 'none';
  }

  async function generate() {
    const apiKey = apiKeyInput.value.trim();
    const productName = productInput.value.trim();
    const model = modelSelect.value;

    if (!apiKey) { showStatus('Claude API Key를 먼저 입력하세요.', 'error'); return; }
    if (!productName) { showStatus('제품명을 입력하세요.', 'error'); return; }

    generateBtn.disabled = true;
    generateBtn.textContent = '생성 중…';
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
    hideProgress();
    showStatus(`<span class="spinner"></span>Claude가 "${escapeHtml(productName)}"에 대해 웹 검색 후 GEO 콘텐츠를 생성하고 있습니다. 1~3분 소요됩니다.`, 'loading');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: model,
          max_tokens: 16000,
          system: SYSTEM_PROMPT,
          messages: [
            { role: 'user', content: `제품명: ${productName}\n\n이 제품에 대해 web_search 도구로 철저히 조사한 뒤, 지시한 JSON 스키마대로 GEO 최적화 콘텐츠를 생성해주세요.` }
          ],
          tools: [
            { type: 'web_search_20250305', name: 'web_search', max_uses: 8 }
          ]
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API 오류 (${response.status})\n${errText}`);
      }

      const data = await response.json();

      const searchQueries = [];
      (data.content || []).forEach(block => {
        if (block.type === 'server_tool_use' && block.name === 'web_search') {
          if (block.input && block.input.query) searchQueries.push(block.input.query);
        }
      });
      if (searchQueries.length) {
        showProgress(`웹 검색 수행: ${searchQueries.map(q => `"${q}"`).join(', ')}`);
      }

      const textContent = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');

      if (!textContent) throw new Error('응답에 텍스트가 없습니다.\n\n전체 응답:\n' + JSON.stringify(data, null, 2).slice(0, 1000));

      const parsed = extractJSON(textContent);
      if (!parsed || !parsed.sections) {
        throw new Error(`JSON 파싱 실패. 원본 응답 일부:\n\n${textContent.slice(0, 1200)}`);
      }

      renderResults(parsed);
      hideStatus();
    } catch (err) {
      showStatus(`오류: ${err.message}`, 'error');
      hideProgress();
    } finally {
      generateBtn.disabled = false;
      generateBtn.textContent = 'GEO 콘텐츠 생성';
    }
  }

  function extractJSON(text) {
    let t = text.trim();
    t = t.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/\s*```$/, '').trim();
    const start = t.indexOf('{');
    const end = t.lastIndexOf('}');
    if (start === -1 || end === -1 || end <= start) return null;
    const jsonStr = t.slice(start, end + 1);
    try {
      return JSON.parse(jsonStr);
    } catch (e) {
      const fixed = jsonStr.replace(/,(\s*[}\]])/g, '$1');
      try { return JSON.parse(fixed); } catch (_) { return null; }
    }
  }

  function renderResults(data) {
    resultsEl.style.display = 'block';

    const intro = document.createElement('div');
    intro.className = 'results-intro';
    intro.innerHTML = `
      <h2>${escapeHtml(data.productName || '제품')}</h2>
      <p>아래 10개 포맷을 랜딩 페이지, FAQ 섹션, JSON-LD 스크립트 등 적절한 위치에 배치하세요. 각 섹션 우측 상단의 <strong>복사</strong> 버튼으로 원본 텍스트를 가져올 수 있습니다.</p>
    `;
    resultsEl.appendChild(intro);

    SECTION_META.forEach((meta, idx) => {
      const content = data.sections?.[meta.key];
      if (content === undefined || content === null) return;

      const card = document.createElement('div');
      card.className = 'section-card';
      card.innerHTML = `
        <div class="section-header">
          <div class="section-number">${idx + 1}</div>
          <div class="section-meta">
            <div class="section-title">${escapeHtml(meta.title)}</div>
            <div class="section-subtitle">${escapeHtml(meta.subtitle)}</div>
          </div>
          <button class="copy-btn" type="button">복사</button>
        </div>
        <div class="section-content"></div>
      `;

      card.querySelector('.section-content').innerHTML = renderSection(meta.key, content);

      const copyBtn = card.querySelector('.copy-btn');
      copyBtn.addEventListener('click', async () => {
        const txt = sectionToText(meta.key, content);
        try {
          await navigator.clipboard.writeText(txt);
          copyBtn.textContent = '복사됨';
          copyBtn.classList.add('copied');
          setTimeout(() => { copyBtn.textContent = '복사'; copyBtn.classList.remove('copied'); }, 1500);
        } catch (_) {
          const ta = document.createElement('textarea');
          ta.value = txt; document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
          copyBtn.textContent = '복사됨'; copyBtn.classList.add('copied');
          setTimeout(() => { copyBtn.textContent = '복사'; copyBtn.classList.remove('copied'); }, 1500);
        }
      });

      resultsEl.appendChild(card);
    });

    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderSection(key, c) {
    switch (key) {
      case 'faq':
        if (!Array.isArray(c)) return '';
        return c.map(it => `
          <div class="faq-item">
            <div class="faq-q">Q. ${escapeHtml(it.q || '')}</div>
            <div class="faq-a">A. ${escapeHtml(it.a || '')}</div>
          </div>`).join('');

      case 'definition':
        return `<div class="quote-block">${escapeHtml(c)}</div>`;

      case 'factsheet':
        if (!Array.isArray(c)) return '';
        return `<ul class="factsheet-list">${c.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>`;

      case 'comparison': {
        if (!c || !Array.isArray(c.headers) || !Array.isArray(c.rows)) return '';
        return `
          <div class="comparison-wrap">
            <table class="comparison">
              <thead><tr>${c.headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
              <tbody>
                ${c.rows.map(r => `<tr>${r.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}
              </tbody>
            </table>
          </div>`;
      }

      case 'useCases':
        if (!Array.isArray(c)) return '';
        return c.map(uc => `
          <div class="usecase-item">
            <div class="usecase-persona">${escapeHtml(uc.persona || '')}</div>
            <div>${escapeHtml(uc.description || '')}</div>
          </div>`).join('');

      case 'listicle': {
        if (!c || !Array.isArray(c.items)) return '';
        return `
          <div class="listicle-title">${escapeHtml(c.title || '')}</div>
          <ol class="listicle-list">
            ${c.items.map(it => `
              <li class="listicle-item">
                <div class="listicle-item-title">${escapeHtml(it.title || '')}</div>
                <div>${escapeHtml(it.description || '')}</div>
              </li>`).join('')}
          </ol>`;
      }

      case 'authority':
        return `<div class="quote-block">${escapeHtml(c)}</div>`;

      case 'schemaJsonLd': {
        const jsonStr = JSON.stringify(c, null, 2);
        return `<pre class="json-block">${escapeHtml(jsonStr)}</pre>`;
      }

      case 'semanticKeywords':
        return `<p>${escapeHtml(c)}</p>`;

      case 'review':
        return `<div class="quote-block">${escapeHtml(c)}</div>`;

      case 'influencerGuide': {
        if (!c || !Array.isArray(c.categories)) return '';
        const overview = c.overview ? `<div class="guide-overview">${escapeHtml(c.overview)}</div>` : '';
        const categories = c.categories.map(cat => `
          <div class="guide-category">
            <div class="guide-category-name">${escapeHtml(cat.name || '')}</div>
            ${cat.description ? `<div class="guide-category-desc">${escapeHtml(cat.description)}</div>` : ''}
            ${Array.isArray(cat.templates) && cat.templates.length ? `
              <div class="guide-label">템플릿</div>
              <ul class="guide-templates">
                ${cat.templates.map(t => `<li>${escapeHtml(t)}</li>`).join('')}
              </ul>` : ''}
            ${Array.isArray(cat.examples) && cat.examples.length ? `
              <div class="guide-label">예시 문장</div>
              <ul class="guide-examples">
                ${cat.examples.map(e => `<li>${escapeHtml(e)}</li>`).join('')}
              </ul>` : ''}
          </div>
        `).join('');
        return overview + categories;
      }
    }
    return '';
  }

  function sectionToText(key, c) {
    switch (key) {
      case 'faq':
        return c.map(it => `Q. ${it.q}\nA. ${it.a}`).join('\n\n');
      case 'definition':
        return c;
      case 'factsheet':
        return c.map(x => `- ${x}`).join('\n');
      case 'comparison': {
        const head = '| ' + c.headers.join(' | ') + ' |';
        const sep  = '|' + c.headers.map(() => '---').join('|') + '|';
        const body = c.rows.map(r => '| ' + r.join(' | ') + ' |').join('\n');
        return [head, sep, body].join('\n');
      }
      case 'useCases':
        return c.map(uc => `■ ${uc.persona}\n${uc.description}`).join('\n\n');
      case 'listicle':
        return `${c.title}\n\n` + c.items.map((it, i) => `${i + 1}. ${it.title}\n   ${it.description}`).join('\n\n');
      case 'authority':
        return c;
      case 'schemaJsonLd':
        return `<script type="application/ld+json">\n${JSON.stringify(c, null, 2)}\n<\/script>`;
      case 'semanticKeywords':
        return c;
      case 'review':
        return c;
      case 'influencerGuide': {
        if (!c || !Array.isArray(c.categories)) return '';
        const parts = [];
        if (c.overview) parts.push(c.overview + '\n');
        c.categories.forEach((cat, i) => {
          parts.push(`[${i + 1}] ${cat.name}`);
          if (cat.description) parts.push(cat.description);
          if (Array.isArray(cat.templates) && cat.templates.length) {
            parts.push('\n▪ 템플릿');
            cat.templates.forEach(t => parts.push(`  - ${t}`));
          }
          if (Array.isArray(cat.examples) && cat.examples.length) {
            parts.push('\n▪ 예시 문장');
            cat.examples.forEach(e => parts.push(`  → ${e}`));
          }
          parts.push('');
        });
        return parts.join('\n');
      }
    }
    return '';
  }

  function escapeHtml(s) {
    if (s == null) return '';
    if (typeof s !== 'string') s = String(s);
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
