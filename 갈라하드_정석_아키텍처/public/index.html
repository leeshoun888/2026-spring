<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>갈라하드 정석 아키텍처 실행기</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient"></div>
    <main class="shell">
      <header class="hero panel">
        <p class="eyebrow">Galahad Execution Console</p>
        <h1>갈라하드 정석 아키텍처 실행기</h1>
        <p class="subline">TU01~TU06 상태머신 기반 실동작 파이프라인</p>
        <div class="status-row">
          <span>파이프라인 상태</span>
          <strong id="pipelineStatus">로딩 중</strong>
        </div>
      </header>

      <section class="panel settings" id="settingsPanel">
        <div class="panel-title-row">
          <h2>API 설정</h2>
          <button id="saveSettingsBtn" class="btn solid">설정 저장</button>
        </div>

        <div class="settings-grid">
          <article class="setting-card">
            <h3>LLM (프롬프트)</h3>
            <label>Provider
              <select id="llmProvider">
                <option value="mock">mock</option>
                <option value="openai">openai</option>
                <option value="custom">custom</option>
              </select>
            </label>
            <label>Model
              <input id="llmModel" type="text" placeholder="gpt-5-mini" />
            </label>
            <label>Custom Endpoint
              <input id="llmEndpoint" type="text" placeholder="https://example.com/llm" />
            </label>
            <label>Key Header
              <input id="llmKeyHeader" type="text" placeholder="Authorization" />
            </label>
            <label>API Key
              <input id="llmApiKey" type="password" placeholder="새 키 입력 시 업데이트" />
            </label>
            <button class="btn ghost small" data-clear-key="llm">LLM 키 지우기</button>
            <p class="hint" id="llmKeyHint"></p>
          </article>

          <article class="setting-card">
            <h3>Image API</h3>
            <label>Provider
              <select id="imageProvider">
                <option value="mock">mock</option>
                <option value="openai">openai</option>
                <option value="custom">custom</option>
              </select>
            </label>
            <label>Model
              <input id="imageModel" type="text" placeholder="gpt-image-1" />
            </label>
            <label>Low Endpoint
              <input id="imageEndpointLow" type="text" placeholder="https://example.com/image/low" />
            </label>
            <label>High Endpoint
              <input id="imageEndpointHigh" type="text" placeholder="https://example.com/image/high" />
            </label>
            <label>Key Header
              <input id="imageKeyHeader" type="text" placeholder="Authorization" />
            </label>
            <label>API Key
              <input id="imageApiKey" type="password" placeholder="새 키 입력 시 업데이트" />
            </label>
            <button class="btn ghost small" data-clear-key="image">이미지 키 지우기</button>
            <p class="hint" id="imageKeyHint"></p>
          </article>

          <article class="setting-card">
            <h3>Video API</h3>
            <label>Provider
              <select id="videoProvider">
                <option value="mock">mock</option>
                <option value="custom">custom</option>
              </select>
            </label>
            <label>Model
              <input id="videoModel" type="text" placeholder="video-model-name" />
            </label>
            <label>Low Endpoint
              <input id="videoEndpointLow" type="text" placeholder="https://example.com/video/low" />
            </label>
            <label>High Endpoint
              <input id="videoEndpointHigh" type="text" placeholder="https://example.com/video/high" />
            </label>
            <label>Key Header
              <input id="videoKeyHeader" type="text" placeholder="Authorization" />
            </label>
            <label>API Key
              <input id="videoApiKey" type="password" placeholder="새 키 입력 시 업데이트" />
            </label>
            <button class="btn ghost small" data-clear-key="video">영상 키 지우기</button>
            <p class="hint" id="videoKeyHint"></p>
          </article>
        </div>
      </section>

      <section class="panel kickoff">
        <div class="panel-title-row">
          <h2>컷 입력</h2>
          <div class="action-row">
            <button id="startBtn" class="btn solid">파이프라인 시작</button>
            <button id="resetBtn" class="btn ghost">리셋</button>
          </div>
        </div>

        <label>컷 설명
          <textarea id="cutDescription" rows="4" placeholder="예: 새벽 공장 라인 위로 카메라가 이동하며 제품이 빛나는 장면"></textarea>
        </label>
        <label>컷 목적
          <input id="cutPurpose" type="text" placeholder="예: 프리미엄/신뢰감 전달" />
        </label>
      </section>

      <section class="pipeline-grid">
        <article class="panel stage" id="tu01Card"></article>
        <article class="panel stage" id="tu02Card"></article>
        <article class="panel stage" id="tu03Card"></article>
        <article class="panel stage" id="tu04Card"></article>
        <article class="panel stage" id="tu05Card"></article>
        <article class="panel stage" id="tu06Card"></article>
      </section>

      <section class="panel final-output" id="finalOutputCard"></section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
