<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일유업 AI 크리에이티브 에이전트</title>
<style>
  :root {
    --navy: #00448B;
    --navy-90: rgba(0,68,139,0.90);
    --navy-60: rgba(0,68,139,0.60);
    --navy-35: rgba(0,68,139,0.35);
    --navy-18: rgba(0,68,139,0.18);
    --navy-10: rgba(0,68,139,0.10);
    --navy-05: rgba(0,68,139,0.05);
    --white: #FFFFFF;
    --bg: #FFFFFF;
    --bg-secondary: #fbfbfd;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #86868b;
    --border: #d2d2d7;
    --border-light: #e8e8ed;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
      "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", Helvetica, Arial, sans-serif;
    font-size: 17px; line-height: 1.47; letter-spacing: -0.022em;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 56px 22px 80px; }
  header { text-align: center; margin-bottom: 56px; }
  .logo { height: 44px; width: auto; display: inline-block; margin-bottom: 28px; }
  h1 { font-size: 40px; line-height: 1.1; letter-spacing: -0.01em; font-weight: 600; color: var(--text-primary); margin: 0 0 10px; }
  .subtitle { font-size: 19px; color: var(--text-secondary); margin: 0; font-weight: 400; }
  .card { background: var(--bg); border: 1px solid var(--border-light); border-radius: 18px; padding: 22px 24px; margin-bottom: 14px; transition: border-color .2s; }
  .card:focus-within { border-color: var(--navy); }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-primary); letter-spacing: -0.01em; }
  input[type="text"] { width: 100%; padding: 12px 14px; font-size: 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); outline: none; font-family: inherit; transition: border-color .15s, background .15s; }
  input[type="text"]:focus { border-color: var(--navy); background: var(--bg); }
  .input-row { display: flex; gap: 10px; }
  .input-row input { flex: 1; }
  button { background: var(--navy); color: white; border: none; border-radius: 980px; padding: 12px 22px; font-size: 15px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: inherit; letter-spacing: -0.01em; transition: background .2s, transform .1s; }
  button:hover { background: rgba(0,52,105,1); }
  button:active { transform: scale(0.97); }
  button:disabled { background: var(--border); color: var(--text-tertiary); cursor: not-allowed; transform: none; }
  h2 { font-size: 28px; line-height: 1.14; letter-spacing: .004em; font-weight: 600; margin: 48px 0 8px; color: var(--text-primary); }
  .hint { font-size: 15px; color: var(--text-secondary); margin: 0 0 20px; letter-spacing: -.01em; }
  #status { font-size: 14px; color: var(--navy); margin: 20px 0; min-height: 22px; letter-spacing: -.01em; text-align: center; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 1.5px solid var(--navy); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* AI Loader Panel */
  #aiLoader {
    display: none;
    background: var(--white);
    border-radius: 18px;
    padding: 24px 24px 20px;
    margin: 24px 0;
    border: 1px solid var(--navy-18);
    box-shadow: 0 2px 16px var(--navy-05), 0 1px 4px var(--navy-10);
  }
  .ai-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .ai-badge { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; letter-spacing: .1em; color: var(--navy-60); text-transform: uppercase; }
  .ai-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--navy); animation: pulse-dot 1.6s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(1.5); } }
  .ai-timer { font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 11px; color: var(--navy-35); letter-spacing: .08em; }

  /* Workflow SVG */
  #workflowSvg { width: 100%; height: auto; display: block; margin-bottom: 20px; }

  /* Agent nodes */
  .wf-node .nb { fill: var(--white); stroke: var(--navy-18); stroke-width: 1; transition: fill .35s, stroke .35s, stroke-width .3s; }
  .wf-node.wf-active .nb { fill: var(--navy); stroke: var(--navy); stroke-width: 1.5; filter: drop-shadow(0 2px 8px rgba(0,68,139,0.22)); }
  .wf-node.wf-done .nb { fill: var(--white); stroke: var(--navy-35); stroke-width: 1; }
  .wf-node .nl { fill: var(--navy-35); font-size: 9px; font-family: "SF Mono","Fira Code",ui-monospace,monospace; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; pointer-events: none; transition: fill .35s; }
  .wf-node.wf-active .nl { fill: var(--white); }
  .wf-node.wf-done .nl { fill: var(--navy-60); }
  .wf-node .ns { fill: var(--navy-18); font-size: 7px; font-family: -apple-system, sans-serif; pointer-events: none; transition: fill .35s; }
  .wf-node.wf-active .ns { fill: rgba(255,255,255,0.72); }
  .wf-node.wf-done .ns { fill: var(--navy-35); }

  /* Data nodes — dashed border */
  .wf-data .nb { fill: var(--white); stroke: var(--navy-35); stroke-width: 1; stroke-dasharray: 4 3; transition: fill .35s, stroke .35s, stroke-width .3s; }
  .wf-data.wf-active .nb { fill: var(--navy); stroke: var(--navy); stroke-width: 1.5; stroke-dasharray: none; filter: drop-shadow(0 2px 8px rgba(0,68,139,0.22)); }
  .wf-data.wf-done .nb { fill: var(--white); stroke: var(--navy-35); stroke-width: 1; stroke-dasharray: 4 3; }
  .wf-data .nl { fill: var(--navy-60); font-size: 9px; font-family: "SF Mono","Fira Code",ui-monospace,monospace; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; pointer-events: none; transition: fill .35s; }
  .wf-data.wf-active .nl { fill: var(--white); }
  .wf-data.wf-done .nl { fill: var(--navy-35); }
  .wf-data .ns { fill: var(--navy-35); font-size: 7px; font-family: -apple-system, sans-serif; pointer-events: none; transition: fill .35s; }
  .wf-data.wf-active .ns { fill: rgba(255,255,255,0.72); }
  .wf-data.wf-done .ns { fill: var(--navy-18); }

  /* Edges */
  .wf-edge { fill: none; stroke: var(--navy-10); stroke-width: .8; transition: stroke .45s, stroke-width .3s; }
  .wf-edge.wf-e-on   { stroke: var(--navy-60); stroke-width: 1.2; }
  .wf-edge.wf-e-data { stroke: var(--navy-35); stroke-width: 1.2; stroke-dasharray: 4 3; }
  .wf-edge.wf-e-final{ stroke: var(--navy);    stroke-width: 1.4; }
  .wf-edge.wf-e-off  { stroke: var(--navy-10); stroke-width: .8; }

  /* Flow dots */
  .wf-dot { opacity: 0; transition: opacity .4s; }
  .wf-dot.wf-d-on { opacity: 1; }

  /* Phase list */
  .phase-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .phase-item { display: flex; align-items: center; gap: 12px; opacity: .22; transition: opacity .5s, transform .45s; transform: translateX(-5px); }
  .phase-item.active { opacity: 1; transform: translateX(0); }
  .phase-item.done   { opacity: .45; transform: translateX(0); }
  .phase-num { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--navy-35); border: 1px solid var(--navy-18); background: var(--white); transition: all .35s; }
  .phase-item.active .phase-num { color: var(--white); background: var(--navy); border-color: var(--navy); box-shadow: 0 1px 6px var(--navy-18); }
  .phase-item.done   .phase-num { color: var(--navy-60); border-color: var(--navy-35); background: var(--white); }
  .phase-content { flex: 1; }
  .phase-label { font-size: 11.5px; font-weight: 600; letter-spacing: .035em; color: var(--navy-35); text-transform: uppercase; margin-bottom: 5px; transition: color .35s; }
  .phase-item.active .phase-label { color: var(--navy); }
  .phase-item.done   .phase-label { color: var(--navy-60); }
  .phase-bar-wrap { height: 2px; background: var(--navy-10); border-radius: 2px; overflow: hidden; }
  .phase-bar { height: 100%; width: 0%; border-radius: 2px; background: var(--navy); transition: width .15s linear; }
  .phase-item.done .phase-bar { width: 100% !important; background: var(--navy-60); }
  .phase-check { font-size: 12px; color: var(--navy); opacity: 0; transition: opacity .3s; font-weight: 600; }
  .phase-item.done .phase-check { opacity: 1; }

  /* Log terminal */
  .log-terminal { background: var(--navy-05); border-radius: 10px; border: 1px solid var(--navy-10); padding: 10px 14px; height: 64px; overflow: hidden; font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 10.5px; line-height: 1.75; }
  .log-line { color: var(--navy-60); white-space: nowrap; overflow: hidden; }
  .log-line .lt  { color: var(--navy-18); margin-right: 7px; }
  .log-line .lok { color: var(--navy); font-weight: 600; }
  .log-line .lpr { color: var(--navy-60); }
  .log-line .lnu { color: var(--navy-35); }
  .log-cursor { display: inline-block; width: 6px; height: 11px; background: var(--navy); vertical-align: -1px; animation: blink-cur .9s steps(1) infinite; }
  @keyframes blink-cur { 0%,100% { opacity:1; } 50% { opacity:0; } }

  /* Metrics */
  .metrics-row { display: flex; gap: 8px; margin-top: 14px; }
  .metric-card { flex: 1; background: var(--white); border: 1px solid var(--navy-10); border-radius: 10px; padding: 10px 12px; text-align: center; }
  .metric-val { font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 15px; font-weight: 700; color: var(--navy); letter-spacing: -.02em; line-height: 1; }
  .metric-label { font-size: 9px; font-weight: 600; letter-spacing: .1em; color: var(--navy-35); text-transform: uppercase; margin-top: 4px; }

  /* Idea cards */
  .idea-card { background: var(--bg); border: 1px solid var(--border-light); border-radius: 18px; padding: 22px 24px; margin-bottom: 12px; cursor: pointer; opacity: 0; transform: translateY(12px); transition: opacity .45s ease, transform .45s ease, border-color .2s, box-shadow .2s; }
  .idea-card.visible { opacity: 1; transform: translateY(0); }
  .idea-card:hover { border-color: var(--navy); box-shadow: 0 4px 16px var(--navy-05); }
  .idea-card.selected { border-color: var(--navy); background: rgba(0,68,139,0.03); box-shadow: 0 4px 16px var(--navy-10); }
  .idea-title   { font-weight: 600; font-size: 19px; margin-bottom: 6px; color: var(--text-primary); letter-spacing: -.01em; }
  .idea-concept { font-size: 15px; color: var(--navy); margin-bottom: 10px; font-weight: 500; letter-spacing: -.01em; }
  .idea-desc    { font-size: 15px; color: var(--text-secondary); line-height: 1.52; letter-spacing: -.01em; }
  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--navy); vertical-align: text-bottom; animation: blink .7s steps(1) infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  /* Video loading */
  #videoStatus { display: none; text-align: center; padding: 36px 24px; background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: 18px; margin-top: 28px; }
  .video-loading-label { font-size: 14px; color: var(--navy); margin-top: 4px; letter-spacing: -.01em; }
  .video-loading-bar-wrap { width: 100%; max-width: 320px; height: 2px; background: var(--border-light); border-radius: 2px; margin: 14px auto 0; overflow: hidden; }
  .video-loading-bar { height: 100%; background: var(--navy); border-radius: 2px; width: 0%; transition: width .5s ease; }
  .vspinner { display: inline-block; width: 12px; height: 12px; border: 1.5px solid var(--navy); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: -2px; }

  /* Video section */
  #videoSection { display: none; margin-top: 28px; opacity: 0; transform: translateY(16px); transition: opacity .5s ease, transform .5s ease; }
  #videoSection.visible { opacity: 1; transform: translateY(0); }
  .video-wrap { background: #000; border-radius: 18px; overflow: hidden; border: 1px solid var(--border-light); box-shadow: 0 8px 32px rgba(0,0,0,.12); }
  #videoPlayer { width: 100%; display: block; max-height: 420px; background: #000; }
  .video-label { font-size: 13px; color: var(--text-tertiary); margin-top: 12px; text-align: center; letter-spacing: -.01em; }

  @media(max-width:520px) {
    .wrap { padding: 36px 18px 60px; }
    h1 { font-size: 32px; } .subtitle { font-size: 17px; }
    .input-row { flex-direction: column; } .input-row button { width: 100%; }
    h2 { font-size: 24px; } .logo { height: 38px; }
    .metrics-row { flex-wrap: wrap; } .metric-card { min-width: calc(50% - 4px); }
  }
</style>
</head>

  { id:1, title:"아이디어 1. \"The Ritual\"", concept:"라이프스타일 프리미엄 — 그릭요거트가 고급스러운 일상 의식의 일부", description:"미니멀한 펜트하우스에서 한 여성이 새벽 5시 30분에 일어나 아침 의식을 수행하는 15초 무대사 광고. 블루아워에서 골든아워로 전환되는 빛의 흐름을 따라, 침실에서 깨어남 → 커튼을 열며 일출 맞이 → 주전자로 물 끓이기 → 냉장고에서 매일 그릭요거트 꺼내기 → 숟가락이 요거트 위에 수직으로 서는 밀도 증명 → 꿀과 호두 토핑 → 창가에서 첫 한 스푼까지 7개 컷으로 구성됩니다. 대사와 자막 없이 ASMR급 사운드 디자인(린넨 스침, 물 따르는 소리, 숟가락 누르는 소리, 꿀 떨어지는 소리)과 Nils Frahm·Max Richter 스타일의 미니멀 피아노로만 이야기를 이끕니다. 비주얼 톤: 자연광 only(인공 조명 없음), 린넨·세라믹·대리석, 35mm 필름 텍스처. 색감은 쿨 크림 화이트 + 허니 골드 + 차콜 그림자.", videoSrc:"video1.mp4" },
  { id:2, title:"아이디어 2. \"Chef's Choice\"", concept:"전문가 인증 (Authority) — 미쉐린 셰프가 직접 선택하는 재료", description:"미쉐린 스타 셰프가 자신의 레스토랑 키친에서 그릭요거트를 실제 조리 과정에 전문적으로 활용하는 모습을 보여주는 광고. 토핑이 아닌 진짜 요리 기법 — 양고기 탄두리 마리네이드, 팬소스 에멀전, 페이스트리 반죽, 냉동 디저트 베이스, 미쉐린 플레이팅 스우시, 따뜻한 초콜릿 퐁당 위 차가운 요거트 크넬까지 6가지로 다재다능함을 증명합니다. 마지막에 셰프가 카메라를 응시하며 한마디 남깁니다: \"재료가 정직해야, 요리가 정직합니다.\" 자막 없이 셰프의 육성 나레이션으로 마무리됩니다. 비주얼 톤: 단일 톱라이트의 chiaroscuro, 스테인리스 + 매트 블랙 도자기, 35mm 아나모픽. 딥 블랙 + 웜 하이라이트.", videoSrc:"video2.mp4" },
  { id:3, title:"아이디어 3. \"Blank Canvas\"", concept:"제품의 예술화 (Artistic Elevation) — 그릭요거트를 미술 매체 수준으로 격상", description:"순백의 미니멀 스튜디오에서 한 현대 아티스트가 매일 그릭요거트를 유일한 미술 매체로 사용해 빈 캔버스 위에 단 하나의 완벽한 곡선을 그리는 15초 단일 테이크 광고. 팔레트 대신 요거트 그릇, 붓 대신 은 숟가락. 호흡을 가다듬고 숟가락에 요거트를 떠 한 번의 일필휘지로 캔버스 위에 캘리그래피적 곡선을 그리면, 밀도 높은 요거트가 흘러내리지 않고 입체적 융기로 자리잡으며 빛과 그림자로만 만들어지는 회화가 완성됩니다. 마지막에 여성 큐레이터 톤의 나레이션이 흐릅니다: \"비로소, 그 자체로 완성됩니다.\" 비주얼 톤: 화이트 큐브 갤러리 미학, 북향 자연광, 35mm 아나모픽. 색감은 순백 + 쿨 크림 + 페일 그레이 모노크롬.", videoSrc:"video3.mp4" }

function wfNode(id,state){var el=document.getElementById("wfn-"+id);if(!el)return;el.classList.remove("wf-active","wf-done");if(state)el.classList.add(state==="active"?"wf-active":"wf-done");}
function wfEdge(idx,cls){var el=document.getElementById("e"+idx),dot=document.getElementById("dot"+idx);if(el){el.className="wf-edge"+(cls?" "+cls:"");}if(dot){if(cls&&cls!=="wf-e-off")dot.classList.add("wf-d-on");else dot.classList.remove("wf-d-on");}}
function wfReset(){["orch","geo","web","voc","creative","visual","synth"].forEach(function(id){wfNode(id,null);});for(var i=0;i<9;i++){wfEdge(i,null);}}

var LOG=[
  ["lok","[INIT]","오케스트레이터 에이전트 초기화 — 3개 서브 에이전트 병렬 실행"],
  ["lpr","[GEO]","매일유업 GEO 데이터 API 연결 — 전국 판매 노드 228개 로드"],
  ["lpr","[VOC]","매일유업 VOC DB 연결 — 고객 피드백 레코드 41,382건 수집 중"],
  ["lok","[OK]","GEO 인사이트: 강남·판교·해운대 — 프리미엄 수요 밀집 확인"],
  ["lpr","[VOC]","VOC 키워드 추출: 고소함(8.4k) 두께감(6.1k) 든든함(5.8k) 완료"],
  ["lnu","[WEB]","그릭요거트 시장 리서치 — 경쟁 브랜드 14종 크롤링 완료"],
  ["lok","[OK]","GEO+VOC → Creative Concept 에이전트 인텔리전스 주입 완료"],
  ["lpr","[GEN]","크리에이티브 컨셉 샘플링 (beam_search k=5, temp=0.82)"],
  ["lnu","[SYNTH]","Ad Synthesizer — 최종 시안 3종 합성 중..."],
  ["lok","[DONE]","브랜드 피트 94.7% · GEO 적합도 92.1% · VOC 공명도 91.3% ✓"],
];
var logIdx=0;
function addLog(){if(logIdx>=LOG.length)return;var r=LOG[logIdx++],now=new Date(),ts=pad(now.getMinutes())+":"+pad(now.getSeconds())+"."+String(now.getMilliseconds()).slice(0,2);var d=document.createElement("div");d.className="log-line";d.innerHTML="<span class='lt'>["+ts+"]</span><span class='"+r[0]+"'>"+r[1]+"</span> "+r[2];var cur=logTerminal.querySelector(".log-cursor");if(cur)cur.parentNode.insertBefore(d,cur);var lines=logTerminal.querySelectorAll(".log-line:not(:last-child)");if(lines.length>3)lines[0].remove();}
function pad(n){return String(n).padStart(2,"0");}

function animCount(id,target,dur){var el=document.getElementById(id),start=Date.now();var iv=setInterval(function(){var p=Math.min(1,(Date.now()-start)/dur);el.textContent=Math.floor(p*target).toLocaleString();if(p>=1){el.textContent=target.toLocaleString();clearInterval(iv);}},30);}
function activatePhase(idx){var item=document.getElementById("phase"+idx),bar=document.getElementById("bar"+idx);if(!item)return;item.classList.add("active");var w=0,iv=setInterval(function(){w=Math.min(100,w+Math.random()*6+2);bar.style.width=w+"%";if(w>=100)clearInterval(iv);},50);}
function completePhase(idx){var item=document.getElementById("phase"+idx);if(!item)return;item.classList.remove("active");item.classList.add("done");document.getElementById("bar"+idx).style.width="100%";}

function startTimer(){timerStart=Date.now();timerIv=setInterval(function(){var s=((Date.now()-timerStart)/1e3).toFixed(1);aiTimerEl.textContent=String(s).padStart(4,"0")+"s";},100);}
function stopTimer(){clearInterval(timerIv);}
var lTimers=[];
function T(fn,ms){lTimers.push(setTimeout(fn,ms));}
function clearLT(){lTimers.forEach(clearTimeout);lTimers=[];logIdx=0;}

function runSeq(){
  aiLoader.style.display="block"; statusEl.textContent="";
  startTimer(); wfReset();
  /* t=0   orch active */
  T(function(){wfNode("orch","active");},0);
  /* t=300 dispatch → GEO WEB VOC */
  T(function(){wfEdge(0,"wf-e-on");wfEdge(1,"wf-e-on");wfEdge(2,"wf-e-on");activatePhase(0);},300);
  /* t=800 row-1 nodes activate + counters */
  T(function(){["geo","web","voc"].forEach(function(id){wfNode(id,"active");});animCount("mGeo",228,700);animCount("mVoc",41382,1200);},800);
  /* t=1800 phase0 done → data inject edges (dashed) */
  T(function(){wfNode("orch","done");completePhase(0);activatePhase(1);wfEdge(0,"wf-e-off");wfEdge(1,"wf-e-off");wfEdge(2,"wf-e-off");wfEdge(3,"wf-e-data");wfEdge(4,"wf-e-data");wfEdge(5,"wf-e-on");wfEdge(6,"wf-e-on");},1800);
  /* t=3000 phase1 done → creative visual active */
  T(function(){["geo","voc"].forEach(function(id){wfNode(id,"done");});completePhase(1);activatePhase(2);wfEdge(3,"wf-e-off");wfEdge(4,"wf-e-off");wfEdge(5,"wf-e-off");wfEdge(6,"wf-e-off");animCount("mTokens",12847,900);},3000);
  T(function(){wfNode("web","done");wfNode("creative","active");wfNode("visual","active");},3600);
  /* t=5000 phase2 done → synth edges */
  T(function(){completePhase(2);activatePhase(3);wfEdge(7,"wf-e-final");wfEdge(8,"wf-e-final");},5000);
  /* t=5600 synth active */
  T(function(){wfNode("creative","done");wfNode("visual","done");wfNode("synth","active");},5600);
  /* t=6400 all done */
  T(function(){wfNode("synth","done");wfEdge(7,"wf-e-off");wfEdge(8,"wf-e-off");document.getElementById("mScore").textContent="94.7%";completePhase(3);},6400);
  /* logs */
  LOG.forEach(function(_,i){T(addLog,150+i*620);});
  /* t=7000 fade out */
  T(function(){
    stopTimer();
    aiLoader.style.transition="opacity 0.6s"; aiLoader.style.opacity="0";
    setTimeout(function(){aiLoader.style.display="none";aiLoader.style.opacity="1";aiLoader.style.transition="";},600);
    setStatus("3개의 시안이 생성되었습니다. 하나를 선택하세요.");
    renderIdeas();
  },7000);
}

function renderIdeas(){
  ideasContainer.innerHTML="";
  IDEAS.forEach(function(idea,idx){
    var card=document.createElement("div");card.className="idea-card";
    card.innerHTML="<div class=\"idea-title\">"+escH(idea.title)+"</div><div class=\"idea-concept\">"+escH(idea.concept)+"</div><div class=\"idea-desc\" id=\"desc-"+idx+"\"></div>";
    card.addEventListener("click",function(){onIdeaClick(idea,card);});
    ideasContainer.appendChild(card);
    (function(i,c,d){setTimeout(function(){c.classList.add("visible");setTimeout(function(){typeText(document.getElementById("desc-"+i),d,5);},300);},i*500);})(idx,card,idea.description);
  });
  ideasSection.style.display="block";
}

/* 타이핑 속도: 5ms (v5의 12ms에서 약 2.5배 빠르게) */
function typeText(el,text,speed){
  el.innerHTML="<span class=\"cursor\"></span>";var i=0,cur=el.querySelector(".cursor");
  var iv=setInterval(function(){if(i<text.length){cur.insertAdjacentText("beforebegin",text[i]);i++;}else{clearInterval(iv);cur.remove();}},speed);
}

function onIdeaClick(idea,card){
  document.querySelectorAll(".idea-card").forEach(function(c){c.classList.remove("selected");});card.classList.add("selected");
  videoSection.style.display="none";videoSection.classList.remove("visible");videoPlayer.pause();videoPlayer.src="";
  videoStatus.style.display="block";
  videoStatusText.innerHTML="<span class=\"vspinner\"></span>영상을 생성하는 중입니다...";
  videoLoadingBar.style.width="0%";
  [[30,400],[55,900],[75,1500],[90,2100],[98,2700]].forEach(function(p){setTimeout(function(){videoLoadingBar.style.width=p[0]+"%";},p[1]);});
  setTimeout(function(){videoStatusText.innerHTML="<span class=\"vspinner\"></span>프레임을 렌더링하는 중입니다...";},1000);
  setTimeout(function(){videoStatusText.innerHTML="<span class=\"vspinner\"></span>영상을 마무리하는 중입니다...";},2200);
  setTimeout(function(){
    videoLoadingBar.style.width="100%";
    setTimeout(function(){
      videoStatus.style.display="none";videoLoadingBar.style.width="0%";
      videoPlayer.src=idea.videoSrc;videoLabel.textContent=idea.title.replace(/"/g,"");
      videoSection.style.display="block";
      requestAnimationFrame(function(){requestAnimationFrame(function(){videoSection.classList.add("visible");});});
      videoPlayer.play().catch(function(){});
      videoSection.scrollIntoView({behavior:"smooth",block:"start"});
      setStatus("영상 생성이 완료되었습니다.");
    },300);
  },3200);
}

generateBtn.addEventListener("click",function(){
  var product=document.getElementById("product").value.trim();
  if(!product){statusEl.textContent="제품명을 입력해주세요.";return;}
  generateBtn.disabled=true;
  ideasSection.style.display="none";videoStatus.style.display="none";videoSection.style.display="none";videoSection.classList.remove("visible");ideasContainer.innerHTML="";clearLT();
  logTerminal.innerHTML="<div class=\"log-line\"><span class=\"log-cursor\"></span></div>";
  for(var i=0;i<4;i++){var ph=document.getElementById("phase"+i);ph.classList.remove("active","done");document.getElementById("bar"+i).style.width="0%";}
  ["mGeo","mVoc","mTokens"].forEach(function(id){document.getElementById(id).textContent="—";});
  document.getElementById("mScore").textContent="—";
  aiTimerEl.textContent="00.0s";
  runSeq();
  setTimeout(function(){generateBtn.disabled=false;},7200);
});

function setStatus(msg,ld){statusEl.innerHTML=ld?"<span class=\"spinner\"></span>"+msg:msg;}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
</script>
